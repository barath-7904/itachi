<!--
Hr
Attributes :
---------------
	Extra informations that are used with the tag .

	<hr> Tag  - Horizontal Tag .

Attributes:
------------
color
size
width
align - left, right , center (Default - Center)
noshade

-->

<html>
<body>
<center><big> Usage of Hr Tag </big></center>
<hr>
<hr color=green size=80 >
<hr align=left width="80%" color=red size=6>
<hr size=50 noshade>
<hr>
</body>
</html>
